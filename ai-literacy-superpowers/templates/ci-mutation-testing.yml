# Mutation Testing CI Template
#
# This template adds a weekly mutation testing job to your GitHub Actions pipeline.
# Mutation testing verifies that your test suite can detect real defects — it
# mutates the production code (flips operators, removes conditions, etc.) and
# checks whether at least one test fails for each mutation.
#
# A mutation score below ~60% typically indicates that tests are asserting
# execution (coverage) rather than correctness (behaviour).
#
# HOW TO USE:
# 1. Copy the relevant language section(s) into your workflow file.
# 2. Fill in the placeholder values marked with <FILL IN>.
# 3. Adjust the threshold to match your team's quality bar.
# 4. The job is intentionally scheduled weekly (not on every push) because
#    mutation testing is slow — running it on every PR would block developers.
#
# Schedule: weekly on Monday at 07:00 UTC.

# -------------------------------------------------------------------
# Go — using go-mutesting
# -------------------------------------------------------------------
#
# name: Mutation Testing
#
# on:
#   schedule:
#     - cron: "0 7 * * 1"   # Monday 07:00 UTC
#   workflow_dispatch:       # allow manual trigger
#
# jobs:
#   mutate-go:
#     name: Go mutation testing
#     runs-on: ubuntu-latest
#     steps:
#       - uses: actions/checkout@v4
#
#       - uses: actions/setup-go@v5
#         with:
#           go-version: "<FILL IN: e.g. 1.22>"
#
#       - name: Install go-mutesting
#         run: go install github.com/zimmski/go-mutesting/cmd/go-mutesting@latest
#
#       - name: Run mutation tests
#         run: |
#           go-mutesting ./... 2>&1 | tee mutation-report.txt
#           SCORE=$(grep -oP 'The mutation score is \K[0-9.]+' mutation-report.txt)
#           echo "Mutation score: $SCORE"
#           # Fail if score drops below threshold
#           python3 -c "import sys; sys.exit(0 if float('$SCORE') >= <FILL IN: threshold e.g. 0.60> else 1)"
#
#       - name: Upload mutation report
#         if: always()
#         uses: actions/upload-artifact@v4
#         with:
#           name: mutation-report-go
#           path: mutation-report.txt

