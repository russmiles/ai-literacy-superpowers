# Auto-enforcer for PR-scoped harness constraints.
#
# Generated by the harness-engineering plugin.
# Runs both deterministic and agent-based PR constraints from HARNESS.md.
# Deterministic failures are blocking; agent findings are advisory (PR comment).
#
# Prerequisites:
#   - HARNESS.md at the project root with PR-scoped constraints
#   - ANTHROPIC_API_KEY stored as a GitHub Actions secret
#
# See the auto-enforcer-action skill for full documentation.

name: Auto-Enforcer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  INCLUDE_CONSTRAINTS: ""
  EXCLUDE_CONSTRAINTS: ""
  AGENT_MODEL: "claude-opus-4-5"
  COMMENT_MODE: "findings-only"
  MAX_DIFF_SIZE: "51200"

jobs:
  enforce:
    name: Enforce PR constraints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Check HARNESS.md exists
        run: |
          if [ ! -f HARNESS.md ]; then
            echo "::warning::No HARNESS.md found — skipping constraint enforcement"
            echo "SKIP_ALL=true" >> "$GITHUB_ENV"
          fi

      - name: Parse PR-scoped constraints
        if: env.SKIP_ALL != 'true'
        run: |
          # Parse HARNESS.md for constraints with scope: pr
          # Produces two JSON arrays: deterministic_constraints and agent_constraints
          # Each entry has: name, rule, tool (deterministic only), enforcement

          python3 - <<'PYEOF'
          import json, re, os

          with open("HARNESS.md", "r") as f:
              content = f.read()

          # Split into constraint blocks (### headings under ## Constraints)
          in_constraints = False
          blocks = []
          current_block = []
          current_name = ""

          for line in content.split("\n"):
              if line.strip().startswith("## Constraints"):
                  in_constraints = True
                  continue
              if in_constraints and line.strip().startswith("## ") and not line.strip().startswith("### "):
                  in_constraints = False
                  if current_name:
                      blocks.append({"name": current_name, "lines": current_block})
                  continue
              if in_constraints and line.strip().startswith("### "):
                  if current_name:
                      blocks.append({"name": current_name, "lines": current_block})
                  current_name = line.strip().lstrip("# ").strip()
                  current_block = []
                  continue
              if in_constraints and current_name:
                  current_block.append(line)

          if current_name:
              blocks.append({"name": current_name, "lines": current_block})

          # Parse each block for metadata
          def parse_field(lines, field):
              for line in lines:
                  match = re.match(rf"[-*]\s+\**{field}\**\s*:\s*(.*)", line, re.IGNORECASE)
                  if match:
                      return match.group(1).strip()
              return ""

          include = os.environ.get("INCLUDE_CONSTRAINTS", "").strip()
          exclude = os.environ.get("EXCLUDE_CONSTRAINTS", "").strip()
          include_list = [s.strip().lower() for s in include.split(",") if s.strip()] if include else []
          exclude_list = [s.strip().lower() for s in exclude.split(",") if s.strip()] if exclude else []

          deterministic = []
          agent = []

          for block in blocks:
              scope = parse_field(block["lines"], "Scope")
              if "pr" not in scope.lower():
                  continue

              name = block["name"]
              name_lower = name.lower().replace(" ", "-")

              if include_list and not any(i in name_lower for i in include_list):
                  continue
              if any(e in name_lower for e in exclude_list):
                  continue

              enforcement = parse_field(block["lines"], "Enforcement")
              rule = parse_field(block["lines"], "Rule")
              tool = parse_field(block["lines"], "Tool")

              entry = {"name": name, "rule": rule, "tool": tool, "enforcement": enforcement}

              if "deterministic" in enforcement.lower():
                  deterministic.append(entry)
              elif "agent" in enforcement.lower():
                  agent.append(entry)

          with open(os.environ["GITHUB_ENV"], "a") as env_file:
              env_file.write(f"DETERMINISTIC_CONSTRAINTS={json.dumps(deterministic)}\n")
              env_file.write(f"AGENT_CONSTRAINTS={json.dumps(agent)}\n")
              env_file.write(f"CONSTRAINT_COUNT={len(deterministic) + len(agent)}\n")

          print(f"Found {len(deterministic)} deterministic and {len(agent)} agent PR constraints")
          for c in deterministic:
              print(f"  [deterministic] {c['name']}: {c['tool']}")
          for c in agent:
              print(f"  [agent] {c['name']}: {c['rule']}")
          PYEOF

      - name: Run deterministic constraints
        if: env.SKIP_ALL != 'true' && env.CONSTRAINT_COUNT != '0'
        id: deterministic
        run: |
          # Run each deterministic constraint's tool command and collect results
          RESULTS_FILE=$(mktemp)
          echo "[]" > "$RESULTS_FILE"
          echo "DETERMINISTIC_RESULTS_FILE=$RESULTS_FILE" >> "$GITHUB_ENV"
          HAS_FAILURE="false"

          echo "$DETERMINISTIC_CONSTRAINTS" | python3 -c "
          import json, sys
          constraints = json.loads(sys.stdin.read())
          for c in constraints:
              print(f\"{c['name']}|||{c['tool']}\")
          " | while IFS='|||' read -r name tool; do
            [ -z "$name" ] && continue
            echo "::group::Deterministic: $name"
            echo "Running: $tool"

            OUTPUT=$(eval "$tool" 2>&1) && EXIT_CODE=0 || EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              STATUS="PASS"
              echo "PASS"
            else
              STATUS="FAIL"
              HAS_FAILURE="true"
              echo "FAIL (exit code $EXIT_CODE)"
              echo "$OUTPUT"
            fi

            # Append result to JSON file
            python3 -c "
          import json, sys
          results = json.load(open('$RESULTS_FILE'))
          results.append({
              'name': '''$name''',
              'type': 'deterministic',
              'status': '$STATUS',
              'findings': '''$OUTPUT'''.strip()[:500] if '$STATUS' == 'FAIL' else '--'
          })
          json.dump(results, open('$RESULTS_FILE', 'w'))
          "
            echo "::endgroup::"
          done

          echo "deterministic_failed=$HAS_FAILURE" >> "$GITHUB_OUTPUT"

      - name: Prepare PR diff for agent constraints
        if: env.SKIP_ALL != 'true' && env.AGENT_CONSTRAINTS != '[]'
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          DIFF=$(git diff "origin/${BASE_REF}...HEAD" 2>/dev/null || git diff "origin/${BASE_REF}" HEAD 2>/dev/null || echo "Unable to compute diff")

          DIFF_SIZE=${#DIFF}
          MAX_SIZE=${MAX_DIFF_SIZE:-51200}

          if [ "$DIFF_SIZE" -gt "$MAX_SIZE" ]; then
            echo "::warning::Diff exceeds ${MAX_SIZE} bytes ($DIFF_SIZE bytes). Falling back to file list summary."
            FILE_LIST=$(git diff --stat "origin/${BASE_REF}...HEAD" 2>/dev/null || git diff --stat "origin/${BASE_REF}" HEAD 2>/dev/null || echo "Unable to compute file list")
            CHANGED_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null || git diff --name-only "origin/${BASE_REF}" HEAD 2>/dev/null || echo "")

            DIFF_CONTENT="[Diff too large for full analysis — ${DIFF_SIZE} bytes]

          Changed files summary:
          ${FILE_LIST}

          Changed file list:
          ${CHANGED_FILES}"
          else
            DIFF_CONTENT="$DIFF"
          fi

          # Write diff to a temp file to avoid env var size limits
          DIFF_FILE=$(mktemp)
          echo "$DIFF_CONTENT" > "$DIFF_FILE"
          echo "DIFF_FILE=$DIFF_FILE" >> "$GITHUB_ENV"

      - name: Run agent constraints
        if: env.SKIP_ALL != 'true' && env.AGENT_CONSTRAINTS != '[]'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          RESULTS_FILE="${DETERMINISTIC_RESULTS_FILE:-$(mktemp)}"
          if [ ! -f "$RESULTS_FILE" ] || [ ! -s "$RESULTS_FILE" ]; then
            echo "[]" > "$RESULTS_FILE"
          fi
          echo "ALL_RESULTS_FILE=$RESULTS_FILE" >> "$GITHUB_ENV"

          DIFF_CONTENT=$(cat "$DIFF_FILE")

          echo "$AGENT_CONSTRAINTS" | python3 -c "
          import json, sys
          constraints = json.loads(sys.stdin.read())
          for c in constraints:
              print(f\"{c['name']}|||{c['rule']}\")
          " | while IFS='|||' read -r name rule; do
            [ -z "$name" ] && continue
            echo "::group::Agent: $name"

            # Build the prompt and call Claude API via python to handle escaping
            python3 - "$name" "$rule" "$RESULTS_FILE" <<'AGENTEOF'
          import json, sys, urllib.request, os

          name = sys.argv[1]
          rule = sys.argv[2]
          results_file = sys.argv[3]
          diff_file = os.environ.get("DIFF_FILE", "")
          model = os.environ.get("AGENT_MODEL", "claude-opus-4-5")
          api_key = os.environ.get("ANTHROPIC_API_KEY", "")

          diff_content = ""
          if diff_file and os.path.exists(diff_file):
              with open(diff_file) as f:
                  diff_content = f.read()

          prompt = f"""You are a code review assistant enforcing a project constraint.

          Constraint: {rule}

          Below is the git diff for this pull request. Evaluate whether the changes
          comply with the constraint above. If there are violations, list each one
          with the file path and a brief description. If the changes comply, respond
          with exactly: NO_FINDINGS

          --- BEGIN DIFF ---
          {diff_content}
          --- END DIFF ---"""

          payload = json.dumps({
              "model": model,
              "max_tokens": 1024,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": api_key,
                  "content-type": "application/json",
                  "anthropic-version": "2023-06-01"
              }
          )

          try:
              with urllib.request.urlopen(req, timeout=60) as resp:
                  data = json.loads(resp.read())
                  text = data.get("content", [{}])[0].get("text", "Unable to parse response")
                  if "NO_FINDINGS" in text:
                      status = "PASS"
                      finding_text = "--"
                  else:
                      status = "ADVISORY"
                      finding_text = text[:500]
          except Exception as e:
              status = "SKIP"
              finding_text = f"API call failed: {str(e)[:200]}"
              print(f"::warning::Agent constraint '{name}' skipped — {e}")

          print(f"Result: {status}")

          results = json.load(open(results_file))
          results.append({
              "name": name,
              "type": "agent",
              "status": status,
              "findings": finding_text
          })
          json.dump(results, open(results_file, "w"))
          AGENTEOF

            echo "::endgroup::"
          done

          echo "ALL_RESULTS_FILE=$RESULTS_FILE" >> "$GITHUB_ENV"

      - name: Post PR comment
        if: env.SKIP_ALL != 'true' && env.CONSTRAINT_COUNT != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULTS_FILE="${ALL_RESULTS_FILE:-${DETERMINISTIC_RESULTS_FILE:-}}"

          if [ -z "$RESULTS_FILE" ] || [ ! -f "$RESULTS_FILE" ]; then
            echo "No results file found — skipping comment"
            exit 0
          fi

          # Build the comment body
          COMMENT=$(python3 - "$RESULTS_FILE" <<'COMMENTEOF'
          import json, sys

          results_file = sys.argv[1]
          results = json.load(open(results_file))
          comment_mode = "${COMMENT_MODE}"

          has_findings = any(r["status"] in ("FAIL", "ADVISORY") for r in results)

          if not has_findings and comment_mode == "findings-only":
              print("SKIP_COMMENT")
          else:
              lines = ["## Auto-Enforcer Results", ""]
              lines.append("| Constraint | Type | Status | Findings |")
              lines.append("|---|---|---|---|")
              for r in results:
                  findings = r["findings"].replace("|", "\\|").replace("\n", " ")[:200]
                  lines.append(f"| {r['name']} | {r['type']} | {r['status']} | {findings} |")
              lines.append("")
              if has_findings:
                  lines.append("> **Note**: FAIL = blocking deterministic failure. ADVISORY = agent finding for review (does not block merge).")
              else:
                  lines.append("> All constraints passed.")
              print("\n".join(lines))
          COMMENTEOF
          )

          if [ "$COMMENT" = "SKIP_COMMENT" ]; then
            echo "No findings and comment-mode is findings-only — skipping comment"
            exit 0
          fi

          PR_NUMBER="${{ github.event.pull_request.number }}"
          echo "$COMMENT" | gh pr comment "$PR_NUMBER" --body-file -

      - name: Check deterministic results
        if: env.SKIP_ALL != 'true'
        run: |
          RESULTS_FILE="${ALL_RESULTS_FILE:-${DETERMINISTIC_RESULTS_FILE:-}}"

          if [ -z "$RESULTS_FILE" ] || [ ! -f "$RESULTS_FILE" ]; then
            exit 0
          fi

          python3 - "$RESULTS_FILE" <<'CHECKEOF'
          import json, sys

          results_file = sys.argv[1]
          results = json.load(open(results_file))
          failures = [r for r in results if r["status"] == "FAIL"]
          if failures:
              for f in failures:
                  print(f"FAIL: {f['name']} — {f['findings'][:200]}")
              sys.exit(1)
          else:
              print("All deterministic constraints passed")
          CHECKEOF
