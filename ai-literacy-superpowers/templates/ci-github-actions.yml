# Harness constraint enforcement for pull requests.
#
# Generated by the harness-engineering plugin.
# Runs PR-scoped constraints from HARNESS.md against changed files.
#
# Inspired by Birgitta Boeckeler's "Harness Engineering":
# https://martinfowler.com/articles/exploring-gen-ai/harness-engineering.html

name: Harness Constraints

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enforce:
    name: Enforce PR constraints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check HARNESS.md exists
        run: |
          if [ ! -f HARNESS.md ]; then
            echo "::warning::No HARNESS.md found — skipping constraint enforcement"
            exit 0
          fi

      # Add deterministic tool steps here as constraints are promoted.
      # The harness-engineering plugin generates these steps when you
      # run /harness-constrain and choose a deterministic tool.
      #
      # Example:
      # - name: "Constraint: Consistent formatting"
      #   run: npx prettier --check "src/**/*.ts"

      - name: Summary
        if: always()
        run: echo "Harness constraint check complete. See HARNESS.md for constraint details."
