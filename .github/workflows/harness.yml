# Harness constraint enforcement for pull requests.
#
# Generated by the harness-engineering plugin.
# Runs PR-scoped deterministic constraints from HARNESS.md.
#
# Inspired by Birgitta Boeckeler's "Harness Engineering":
# https://martinfowler.com/articles/exploring-gen-ai/harness-engineering.html

name: Harness Constraints

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enforce:
    name: Enforce PR constraints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check HARNESS.md exists
        run: |
          if [ ! -f HARNESS.md ]; then
            echo "::warning::No HARNESS.md found — skipping constraint enforcement"
            exit 0
          fi

      - name: "Constraint: No secrets in source"
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar xz
          ./gitleaks detect --source . --no-banner --exit-code 1

      - name: "Constraint: Shell scripts pass syntax check"
        run: |
          failed=0
          while IFS= read -r f; do
            if ! bash -n "$f"; then
              echo "FAIL: $f"
              failed=1
            fi
          done < <(find . -name "*.sh" -not -path "./.git/*")
          exit $failed

      - name: "Constraint: Shell scripts use strict mode"
        run: |
          failed=0
          while IFS= read -r f; do
            if ! head -15 "$f" | grep -q "set -euo pipefail"; then
              echo "FAIL: $f missing set -euo pipefail in first 15 lines"
              failed=1
            fi
          done < <(find . -name "*.sh" -not -path "./.git/*")
          exit $failed

      - name: "Constraint: ShellCheck compliance"
        run: |
          sudo apt-get -qq install -y shellcheck
          find . -name "*.sh" -not -path "./.git/*" -exec shellcheck {} +

      - name: Summary
        if: always()
        run: echo "Harness constraint check complete. See HARNESS.md for constraint details."
